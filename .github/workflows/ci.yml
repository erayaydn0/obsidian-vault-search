name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / bun ${{ matrix.bun }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        bun: ["1.3.0", "latest"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ matrix.bun }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ matrix.bun }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify build artifact
        shell: bash
        run: |
          test -f main.js || (echo "main.js missing" && exit 1)
          size=$(wc -c < main.js)
          echo "main.js size: $size bytes"
          # Sanity bound: warn if absurdly small or huge
          if [ "$size" -lt 10000 ]; then
            echo "main.js suspiciously small"
            exit 1
          fi
