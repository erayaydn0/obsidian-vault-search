name: pr-lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  semantic-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            test
            refactor
            perf
            build
            ci
            revert
          requireScope: false
          subjectPattern: ^.{1,72}$
          subjectPatternError: |
            PR title subject must be 1–72 characters.
            Example: "feat: add multilingual reranker"
