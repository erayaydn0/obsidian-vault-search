name: Bug report
description: Report a reproducible bug in VaultSearch
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the form below.
        For questions or general discussion, use **Discussions** instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open vault with X notes
        2. Run command "..."
        3. See error
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: e.g. 1.7.4
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: VaultSearch version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: vault-size
    attributes:
      label: Vault size (approx. number of notes)
      placeholder: e.g. ~3000
  - type: textarea
    id: logs
    attributes:
      label: Console / developer tools logs
      description: Open Obsidian DevTools (Ctrl/Cmd+Shift+I) → Console. Paste any `[VaultSearch]` lines.
      render: shell
